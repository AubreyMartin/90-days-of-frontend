<!-- Day 3 —
 Div Layout Build a page with 3 div blocks 
 — a header, a content area,and a footer. 
 Give each a different background-color, a height, 
 and centered text using the style attribute. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divs layout basics</title>
  </head>
  <body>
    <div style="background-color: black; color: white; text-align: center">
      Header
    </div>
    <div
      style="
        background-color: blue;
        color: rgb(245, 245, 245);
        height: 400px;
        width: 100%;
        align-content: center;
        text-align: center;
      ">
      Content
    </div>
    <div style="background-color: green; color: white; text-align: center">
      Footers
    </div>
  </body>
</html>
